  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0a0f14;
      --text-color: #cfd8dc;
      --nav-bg: #1c1f26;
      --nav-text: #00ffc3;
      --accent-color: #00ffc3;
    }

    body.light-mode {
      --bg-color: #ffffff;
      --text-color: #222222;
      --nav-bg: #f5f5f5;
      --nav-text: #007acc;
      --accent-color: #007acc;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .navbar {
      background-color: var(--nav-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar a,
    .navbar button {
      color: var(--nav-text);
      text-decoration: none;
      padding: 14px 16px;
      font-size: 16px;
      border: none;
      background: none;
      cursor: pointer;
    }

    .navbar a:hover,
    .navbar button:hover {
      background-color: rgba(255, 255, 255, 0.05);
    }

    .toggle-btn {
      font-size: 20px;
      transition: transform 0.2s;
    }

    .toggle-btn:hover {
      transform: scale(1.1);
    }

    .content {
      padding: 40px 20px;
      max-width: 800px;
      margin: auto;
      flex: 1;
    }

    h1 {
      text-align: center;
      font-size: 36px;
      margin-bottom: 30px;
      color: var(--accent-color);
    }

    .social-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .social-links a {
      color: var(--nav-text);
      text-decoration: none;
      font-weight: 600;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color 0.3s ease;
    }

    .social-links a svg {
      fill: var(--nav-text);
      width: 24px;
      height: 24px;
      transition: transform 0.3s, fill 0.3s;
    }

    .social-links a:hover {
      color: var(--accent-color);
    }

    .social-links a:hover svg {
      fill: var(--accent-color);
      transform: scale(1.1);
    }

    .footer {
      background-color: var(--nav-bg);
      color: var(--text-color);
      text-align: center;
      padding: 8px;
      font-size: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    html, body {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 600px) {
      .social-links a {
        font-size: 16px;
      }

      .social-links a svg {
        width: 20px;
        height: 20px;
      }
    }
  </style>
</head>

  <!-- Theme Toggle Script -->
  <script>
    const toggleBtn = document.getElementById('themeToggle');

    function setTheme(theme) {
      document.body.classList.toggle('light-mode', theme === 'light');
      toggleBtn.textContent = theme === 'light' ? '🌙' : '☀️';
      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      const isLight = document.body.classList.contains('light-mode');
      setTheme(isLight ? 'dark' : 'light');
    }

    window.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      setTheme(savedTheme);
    });
  </script>
