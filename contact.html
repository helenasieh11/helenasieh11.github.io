      cursor: pointer;

      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color 0.3s ease;
    }

    .social-links a svg {
      fill: var(--nav-text);
      width: 24px;
      height: 24px;
      transition: transform 0.3s, fill 0.3s;
    }

    .social-links a:hover {
      color: var(--accent-color);

    .social-links a:hover svg {
