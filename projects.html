<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects | Helena Sieh</title>

  <!-- Google Fonts & AOS CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0a0f14;
      --text-color: #cfd8dc;
      --nav-bg: #1c1f26;
      --nav-text: #00ffc3;
      --card-bg: #131921;
      --card-hover: #1e2a38;
      --accent-color: #00ffc3;
    }

    body.light-mode {
      --bg-color: #ffffff;
      --text-color: #222222;
      --nav-bg: #f5f5f5;
      --nav-text: #007acc;
      --card-bg: #f9f9f9;
      --card-hover: #eaeaea;
      --accent-color: #007acc;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      line-height: 1.6;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .navbar {
      background-color: var(--nav-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar a,
    .navbar button {
      color: var(--nav-text);
      text-decoration: none;
      padding: 14px 16px;
      font-size: 16px;
      border: none;
      background: none;
      cursor: pointer;
    }

    .navbar a:hover,
    .navbar button:hover {
      background-color: rgba(255, 255, 255, 0.05);
    }

    .toggle-btn {
      font-size: 20px;
      transition: transform 0.2s;
    }

    .toggle-btn:hover {
      transform: scale(1.1);
    }

    .content {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 50px;
      font-size: 36px;
      color: var(--accent-color);
    }

    .project-card {
      background-color: var(--card-bg);
      padding: 25px;
      border-radius: 10px;
      margin-bottom: 40px;
      transition: background-color 0.3s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .project-card:hover {
      background-color: var(--card-hover);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--accent-color);
    }

    .card-title small {
      color: var(--text-color);
      font-weight: 400;
      font-size: 14px;
      margin-left: 8px;
    }

    .expand-icon {
      font-size: 18px;
      transition: transform 0.3s ease;
    }

    .project-card.expanded .expand-icon {
      transform: rotate(90deg);
    }

    .card-body {
      display: none;
      margin-top: 15px;
    }

    .project-card.expanded .card-body {
      display: block;
    }

    .image-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
      justify-content: center;
    }

    .image-container {
      flex: 1 1 300px;
      text-align: center;
    }

    .image-container img {
      width: 100%;
      max-width: 300px;
      height: 350px;
      object-fit: cover;
      border-radius: 5px;
      border: 1px solid #aaa;
      transition: transform 0.3s ease;
    }

    .image-container img:hover {
      transform: scale(1.05);
    }

    .image-label {
      margin-top: 8px;
      font-size: 14px;
      color: #888;
    }

    iframe {
      margin-top: 20px;
      width: 100%;
      border-radius: 6px;
    }

    .external-link {
      color: var(--accent-color);
      text-decoration: underline;
    }

    .external-link:hover {
      opacity: 0.8;
    }

    .footer {
      background-color: var(--nav-bg);
      color: var(--text-color);
      text-align: center;
      padding: 8px;
      font-size: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    @media (max-width: 600px) {
      .card-title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <div class="navbar">
    <div>
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
      <a href="resume.html">Resume</a>
    </div>
    <button class="toggle-btn" id="themeToggle" onclick="toggleTheme()">🌙</button>
  </div>

  <!-- Content -->
  <div class="content">
    <h1 data-aos="fade-down">My Projects</h1>

    <!-- 🔽 Paste your project cards here exactly as they are 🔽 -->
    <!-- ✅ Already well-structured, no change needed -->
    <!-- 🔼 Example: Tour Guide Robot, VPT, etc. 🔼 -->

    <!-- Keep your existing project-card blocks -->

  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2025 Helena Sieh. All rights reserved.</p>
  </footer>

  <!-- Theme Toggle -->
  <script>
    const toggleBtn = document.getElementById('themeToggle');
    function applyTheme(theme) {
      document.body.classList.toggle('light-mode', theme === 'light');
      toggleBtn.textContent = theme === 'light' ? '🌙' : '☀️';
      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      const isLight = document.body.classList.contains('light-mode');
      applyTheme(isLight ? 'dark' : 'light');
    }

    window.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      applyTheme(savedTheme);
    });
  </script>

  <!-- Expand/Collapse Script -->
  <script>
    function toggleCard(headerEl) {
      const card = headerEl.closest('.project-card');
      card.classList.toggle('expanded');
    }
  </script>

  <!-- AOS JS -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 700,
      once: true,
    });
  </script>
</body>
</html>
