<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume | Helena Sieh</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ─── TOKENS ─── */
    :root {
      --bg:        #0c0e13;
      --surface:   #13161d;
      --border:    rgba(255,255,255,0.07);
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --accent:    #00e5a0;
      --accent2:   #7c6ff7;
      --heading:   #ffffff;
      --card:      #181b23;
      --nav-h:     64px;
      --radius:    14px;
      --transition: 0.35s cubic-bezier(0.22,1,0.36,1);
    }

    [data-theme="light"] {
      --bg:       #f5f4ef;
      --surface:  #ffffff;
      --border:   rgba(0,0,0,0.08);
      --text:     #2a2d35;
      --muted:    #888fa0;
      --accent:   #00a872;
      --accent2:  #5a4fd9;
      --heading:  #0c0e13;
      --card:     #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      transition: background var(--transition), color var(--transition);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ─── BG EFFECTS ─── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 64px 64px;
      opacity: 0.5;
    }

    .bg-glow {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      filter: blur(120px); pointer-events: none; z-index: 0; opacity: 0.1;
      top: -100px; right: -100px; background: var(--accent2);
    }

    /* ─── NAVBAR ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h); z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(20px, 5vw, 60px);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px);
      background: color-mix(in srgb, var(--bg) 70%, transparent);
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem; color: var(--heading);
      text-decoration: none; letter-spacing: -0.01em;
    }

    .nav-links { display: flex; align-items: center; gap: 4px; list-style: none; }

    .nav-links a {
      font-size: 0.875rem; font-weight: 500; color: var(--muted);
      text-decoration: none; padding: 6px 14px; border-radius: 8px;
      transition: color 0.2s, background 0.2s; letter-spacing: 0.01em;
    }

    .nav-links a:hover { color: var(--heading); background: var(--border); }
    .nav-links a.active { color: var(--accent); }

    .theme-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 7px 10px; cursor: pointer;
      font-size: 1rem; color: var(--text); transition: all 0.2s; margin-left: 8px;
    }

    .theme-btn:hover { border-color: var(--accent); }

    /* ─── PAGE HEADER ─── */
    .page-header {
      position: relative; z-index: 1;
      padding: calc(var(--nav-h) + 60px) clamp(20px, 5vw, 60px) 48px;
      max-width: 1100px; margin: 0 auto; width: 100%;
      opacity: 0; animation: fadeUp 0.7s 0.1s forwards;
    }

    .page-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem; color: var(--accent);
      letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px;
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      line-height: 1.05; letter-spacing: -0.03em; color: var(--heading);
    }

    .page-title em { font-style: italic; color: var(--accent); }

    .page-subtitle {
      margin-top: 16px; font-size: 1rem; color: var(--muted);
      font-weight: 300; max-width: 460px;
    }

    /* ─── TOOLBAR ─── */
    .toolbar {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto; width: 100%;
      padding: 0 clamp(20px, 5vw, 60px) 28px;
      display: flex; align-items: center; gap: 12px;
      opacity: 0; animation: fadeUp 0.7s 0.25s forwards;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px; border-radius: 10px;
      font-size: 0.875rem; font-weight: 500;
      text-decoration: none; transition: all 0.2s;
      cursor: pointer; border: none; font-family: 'DM Sans', sans-serif;
    }

    .btn-primary {
      background: var(--accent); color: #000;
    }

    .btn-primary:hover {
      background: color-mix(in srgb, var(--accent) 85%, white);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px color-mix(in srgb, var(--accent) 30%, transparent);
    }

    .btn-ghost {
      background: transparent; color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── MAIN ─── */
    main {
      position: relative; z-index: 1; flex: 1;
      max-width: 1100px; margin: 0 auto; width: 100%;
      padding: 0 clamp(20px, 5vw, 60px) 80px;
      opacity: 0; animation: fadeUp 0.7s 0.4s forwards;
    }

    /* ─── PDF VIEWER ─── */
    .pdf-shell {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      transition: border-color 0.3s;
    }

    .pdf-shell:hover { border-color: color-mix(in srgb, var(--accent) 40%, transparent); }

    .pdf-topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .pdf-topbar-left {
      display: flex; align-items: center; gap: 10px;
    }

    .pdf-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }

    .pdf-filename {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; color: var(--muted); letter-spacing: 0.04em;
    }

    .pdf-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      padding: 3px 10px; border-radius: 20px;
    }

    .pdf-frame {
      width: 100%;
      height: clamp(600px, 80vh, 1050px);
      display: block; border: none;
      background: var(--surface);
    }

    /* ─── FOOTER ─── */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border);
      padding: 28px clamp(20px, 5vw, 60px);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.82rem; color: var(--muted);
    }

    .footer-links { display: flex; gap: 20px; }
    .footer-links a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--accent); }

    /* ─── ANIMATION ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 480px) {
      .nav-links { display: none; }
      .pdf-frame { height: 90vh; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- NAVBAR -->
  <nav>
    <a href="index.html" class="nav-logo">Helena Sieh</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="resume.html" class="active">Resume</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle theme">☀️</button>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <p class="page-eyebrow">// Résumé</p>
    <h1 class="page-title">My <em>Resume.</em></h1>
    <p class="page-subtitle">Download a copy or read it below.</p>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <a href="helena_sieh_resume_121025.pdf" download class="btn btn-primary">
      ↓ Download PDF
    </a>
    <a href="helena_sieh_resume_121025.pdf" target="_blank" class="btn btn-ghost">
      Open in new tab ↗
    </a>
  </div>

  <!-- PDF VIEWER -->
  <main>
    <div class="pdf-shell">
      <div class="pdf-topbar">
        <div class="pdf-topbar-left">
          <div class="pdf-dot" style="background:#ff5f57;"></div>
          <div class="pdf-dot" style="background:#febc2e;"></div>
          <div class="pdf-dot" style="background:#28c840;"></div>
          <span class="pdf-filename">helena_sieh_resume_121025.pdf</span>
        </div>
        <span class="pdf-badge">PDF</span>
      </div>
      <iframe
        class="pdf-frame"
        src="helena_sieh_resume_121025.pdf"
        title="Helena Sieh Resume">
      </iframe>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span>© 2025 Helena Sieh</span>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
    </div>
  </footer>

  <script>
    function applyTheme(dark) {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }
    function toggleTheme() {
      applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark');
    }
    const saved = localStorage.getItem('theme');
    applyTheme(saved ? saved === 'dark' : true);
  </script>
</body>
</html>
