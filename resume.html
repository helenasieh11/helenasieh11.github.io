<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume</title>

  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    :root {
      /* DARK THEME DEFAULTS */
      --bg-color: #0a0f14;
      --text-color: #cfd8dc;
      --nav-bg: #1c1f26;
      --nav-text: #00ffc3;
      --card-bg: #131921;
      --card-hover: #1e2a38;
      --accent-color: #00ffc3;
    }

    body.light-mode {
      /* LIGHT THEME OVERRIDES */
      --bg-color: #ffffff;
      --text-color: #222222;
      --nav-bg: #f5f5f5;
      --nav-text: #007acc;
      --card-bg: #f9f9f9;
      --card-hover: #eaeaea;
      --accent-color: #007acc;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.6;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .navbar {
      background-color: var(--nav-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar a,
    .navbar button {
      color: var(--nav-text);
      text-decoration: none;
      padding: 14px 16px;
      font-size: 16px;
      border: none;
      background: none;
      cursor: pointer;
    }

    .navbar a:hover,
    .navbar button:hover {
      background-color: rgba(0, 0, 0, 0.05);
    }

    .toggle-btn {
      font-size: 20px;
      transition: transform 0.2s;
    }

    .toggle-btn:hover {
      transform: scale(1.1);
    }

    .content {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 36px;
    }

    .project-card {
      background-color: var(--card-bg);
      padding: 25px;
      border-radius: 10px;
      margin-bottom: 40px;
      transition: background-color 0.3s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .project-card:hover {
      background-color: var(--card-hover);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .card-title {
      font-size: 24px;
      color: var(--accent-color);
    }

    .expand-icon {
      font-size: 20px;
      transition: transform 0.3s ease;
    }

    .card-body {
      display: none;
      margin-top: 15px;
      transition: all 0.3s ease;
    }

    .project-card.expanded .card-body {
      display: block;
    }

    .project-card.expanded .expand-icon {
      transform: rotate(90deg);
    }

    .image-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
      justify-content: center;
    }

    .image-container {
      text-align: center;
      flex: 1 1 300px;
    }

    .image-container img {
      width: 100%;
      max-width: 300px;
      height: 350px;
      object-fit: cover;
      border-radius: 5px;
      border: 1px solid #aaa;
      transition: transform 0.3s ease;
    }

    .image-container img:hover {
      transform: scale(1.05);
    }

    .image-label {
      margin-top: 8px;
      font-size: 14px;
      color: #777;
    }

    .external-link {
      color: var(--accent-color);
      text-decoration: underline;
    }

    .external-link:hover {
      opacity: 0.8;
    }

    html, body {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .content {
      flex: 1; /* pushes footer down */
    }
    
    .footer {
      background-color: var(--nav-bg);
      color: var(--text-color);
      text-align: center;
      padding: 8px;      /* thinner */
      font-size: 12px;   /* smaller text */
      border-top: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <div class="navbar">
    <div>
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
      <a href="resume.html">Resume</a>
    </div>
    <button class="toggle-btn" id="themeToggle" onclick="toggleTheme()">🌙</button>
  </div>

  <!-- Main Content -->
  <div class="content">
    <h1 data-aos="fade-down">Resume</h1>
    <p>
      <div style="text-align: center; margin-top: 20px;">
        <iframe src="helena_sieh_resume_270825.pdf" 
      style="width:100%; height:600px;" 
      frameborder="0"></iframe>
      </div>
    </p>

  <!-- Theme Toggle Script -->
  <script>
    const toggleBtn = document.getElementById('themeToggle');

    function applyTheme(theme) {
      if (theme === 'light') {
        document.body.classList.add('light-mode');
        toggleBtn.textContent = '🌙';
      } else {
        document.body.classList.remove('light-mode');
        toggleBtn.textContent = '☀️';
      }
      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      const isLight = document.body.classList.contains('light-mode');
      applyTheme(isLight ? 'dark' : 'light');
    }

    // Load saved theme
    window.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      applyTheme(savedTheme);
    });
  </script>

  <!-- Expand/Collapse Script -->
  <script>
    function toggleCard(headerEl) {
      const card = headerEl.closest('.project-card');
      card.classList.toggle('expanded');
    }
  </script>

  <!-- AOS JS -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 700,
      once: true,
    });
  </script>

  <footer class="footer">
    <p>&copy; 2025 Helena Sieh. All rights reserved.</p>
  </footer>
</body>
</html>
